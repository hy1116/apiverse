# 로컬 테스트 전용 값. docker-compose.yml과 동일한 dev 자격 증명을 그대로 사용한다.
# 실제 배포 환경에서는 이 파일을 커밋하지 말고 kubectl create secret 또는 Sealed Secrets/External Secrets로 대체할 것.
apiVersion: v1
kind: Secret
metadata:
  name: apiverse-secrets
  namespace: apiverse
type: Opaque
stringData:
  postgres-password: postgres
  jwt-secret: apiverse-dev-secret-key-min-32-bytes!!
