apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: apiverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      # k8s가 Service별로 자동 주입하는 <SERVICE>_PORT류 레거시 env가 우리 프로퍼티 이름과 겹칠 수 있어 비활성화
      # (예: REDIS_PORT — 지금은 아래서 명시적으로 다시 선언해 덮어써서 우연히 안전하지만, 근본적으로 막는다)
      enableServiceLinks: false
      # gateway는 부팅 시 schema.sql을 실행하므로(spring.sql.init.mode=always) postgres가 응답할 때까지 기다린다.
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432 && nc -z redis 6379 && nc -z kafka 9092; do
                echo "waiting for postgres/redis/kafka..."; sleep 2;
              done
      containers:
        - name: gateway
          image: apiverse/gateway:local
          imagePullPolicy: Never  # 로컬 kind/minikube에 미리 로드해둔 이미지만 사용
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: r2dbc:postgresql://postgres:5432/apiverse
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apiverse-secrets
                  key: postgres-password
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: apiverse-secrets
                  key: jwt-secret
            # 앞단 nginx-ingress가 유일하게 신뢰하는 1홉 리버스 프록시이므로 활성화
            - name: TRUST_FORWARDED_HEADERS
              value: "true"
            - name: LOG_PATH
              value: /var/log/apiverse
          volumeMounts:
            - name: logs
              mountPath: /var/log/apiverse
              subPath: gateway
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1
              memory: 768Mi
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: apiverse-logs-pvc
