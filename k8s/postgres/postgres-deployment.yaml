apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: apiverse
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC가 ReadWriteOnce라 롤링 업데이트로 두 파드가 동시에 붙으면 안 됨
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: apiverse
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apiverse-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres  # PGDATA 루트에 lost+found가 있으면 initdb가 실패하므로 서브디렉터리 사용
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "apiverse"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "apiverse"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
