# spring.main.web-application-type=none이라 HTTP 포트가 없다 — Service/Ingress 불필요, readiness/liveness도
# tcpSocket으로 걸 포트가 없어 생략한다(크래시 시 restartPolicy: Always로 자동 재기동됨).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer
  namespace: apiverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-consumer
  template:
    metadata:
      labels:
        app: event-consumer
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432 && nc -z kafka 9092; do
                echo "waiting for postgres/kafka..."; sleep 2;
              done
      containers:
        - name: event-consumer
          image: apiverse/event-consumer:local
          imagePullPolicy: Never  # 로컬 kind/minikube에 미리 로드해둔 이미지만 사용
          env:
            - name: DB_URL
              value: r2dbc:postgresql://postgres:5432/apiverse
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apiverse-secrets
                  key: postgres-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: LOG_PATH
              value: /var/log/apiverse
          volumeMounts:
            - name: logs
              mountPath: /var/log/apiverse
              subPath: event-consumer
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: apiverse-logs-pvc
