spring.application.name=apiverse-event-consumer
spring.main.web-application-type=none

# 로그 파일 (override via env: LOG_PATH) — k8s에서는 PVC를 마운트해 파드 재시작에도 보존
logging.file.name=${LOG_PATH:./logs}/event-consumer.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# R2DBC PostgreSQL (override via env: DB_URL, DB_USERNAME, DB_PASSWORD)
spring.r2dbc.url=${DB_URL:r2dbc:postgresql://localhost:5432/apiverse}
spring.r2dbc.username=${DB_USERNAME:postgres}
spring.r2dbc.password=${DB_PASSWORD:postgres}

# Schema init — gateway가 소유한 스키마이므로 여기서는 절대 실행하지 않음
spring.sql.init.mode=never

# Kafka — 브로커는 모든 토픽 컨슈머가 공유하고, 토픽별 설정은 app.kafka.<topic>.*로 네임스페이스한다.
# 새 토픽 컨슈머를 추가할 때는 이 파일에 app.kafka.<topic>.* 블록만 추가하면 된다.
app.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# billing-log 토픽
app.kafka.billing-log.consumer-group-id=billing-log-consumer
app.kafka.billing-log.batch-max-size=500
app.kafka.billing-log.batch-max-time=2s
