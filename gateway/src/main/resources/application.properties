spring.application.name=apiverse-gateway

# R2DBC PostgreSQL (override via env: DB_URL, DB_USERNAME, DB_PASSWORD)
spring.r2dbc.url=${DB_URL:r2dbc:postgresql://localhost:5432/apiverse}
spring.r2dbc.username=${DB_USERNAME:postgres}
spring.r2dbc.password=${DB_PASSWORD:postgres}

# Schema & seed data (disable in production with 'never')
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Redis (override via env: REDIS_HOST, REDIS_PORT)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT (override secret via env: JWT_SECRET)
app.jwt.secret=${JWT_SECRET:apiverse-dev-secret-key-min-32-bytes!!}
app.jwt.expiration-days=30

# X-Forwarded-For 신뢰 여부 — 앞단에 신뢰 가능한 리버스 프록시(nginx-ingress 등)가 정확히 1홉 있을 때만 true.
# 로컬 개발처럼 프록시 없이 직접 붙는 환경에서는 false로 두어야 헤더 조작으로 인한
# IP 화이트리스트/차단목록 우회를 막을 수 있다. k8s 배포 시 env로 true 설정.
app.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:false}
