spring.application.name=apiverse-admin

server.port=${ADMIN_PORT:8090}

# 로그 파일 (override via env: LOG_PATH) — k8s에서는 PVC를 마운트해 파드 재시작에도 보존
logging.file.name=${LOG_PATH:./logs}/admin.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# R2DBC PostgreSQL (override via env: DB_URL, DB_USERNAME, DB_PASSWORD)
spring.r2dbc.url=${DB_URL:r2dbc:postgresql://localhost:5432/apiverse}
spring.r2dbc.username=${DB_USERNAME:postgres}
spring.r2dbc.password=${DB_PASSWORD:postgres}

# Schema init — use 'never' in production
spring.sql.init.mode=never

# JWT (must match gateway's secret to accept same tokens)
app.jwt.secret=${JWT_SECRET:apiverse-dev-secret-key-min-32-bytes!!}
app.jwt.expiration-days=1

# X-Forwarded-For 신뢰 여부 — 앞단에 신뢰 가능한 리버스 프록시(nginx-ingress 등)가 정확히 1홉 있을 때만 true.
# 로컬 개발처럼 프록시 없이 직접 붙는 환경에서는 false로 두어야 헤더 조작으로 인한 접근 로그 IP 위조를 막을 수 있다.
app.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:false}
